<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouthToPro BD Toolkit</title>
<style>




*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #FFFAF2; --bg3: #f0f4f6;
  --border: #e0e8ec; --border2: #c8d4da;
  --text: #152840; --text2: #2a4a62; --text3: #8589A2;
  --radius: 10px; --shadow: 0 2px 14px rgba(21,40,64,0.09);
  --teal: #7EC5B3; --navy: #152840; --blue: #183B68;
  --green: #347969; --coral: #FC5858; --amber: #F3B557; --slate: #8589A2;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
.topbar { background: #152840; padding: 13px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(21,40,64,0.35); }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .03em; }
.logo span { color: #7EC5B3; }
.topbar-tag { font-size: 11px; color: #7EC5B3; background: rgba(126,197,179,0.15); padding: 3px 11px; border-radius: 12px; border: 1px solid rgba(126,197,179,0.3); }
.topbar-actions { display: flex; gap: 8px; }
.btn { padding: 7px 15px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-ghost { background: rgba(126,197,179,0.12); color: #7EC5B3; border: 1px solid rgba(126,197,179,0.3); }
.btn-ghost:hover { background: rgba(126,197,179,0.22); }
.btn-save { background: #7EC5B3; color: #152840; font-weight: 600; }
.btn-save:hover { background: #6ab5a3; }
.edit-bar { background: #FFF2DD; border-bottom: 1px solid #F3B557; padding: 8px 1.5rem; font-size: 12px; color: #7a5000; display: none; align-items: center; gap: 10px; }
.edit-bar.show { display: flex; }
[contenteditable="true"] { outline: none; border-bottom: 1.5px dashed #F3B557 !important; cursor: text; min-width: 20px; display: inline-block; }
[contenteditable="true"]:focus { background: #FFF2DD !important; border-radius: 3px; padding: 1px 3px; }
.edit-on p[contenteditable="true"],
.edit-on div[contenteditable="true"],
.edit-on li[contenteditable="true"] { display: block; padding: 4px 6px !important; border: 1.5px dashed #F3B557 !important; border-radius: 6px !important; background: #fffef8 !important; min-height: 24px; }
.edit-on p[contenteditable="true"]:focus,
.edit-on div[contenteditable="true"]:focus,
.edit-on li[contenteditable="true"]:focus { background: #FFF2DD !important; }
.editable-block[contenteditable="true"] { display: block; padding: 6px 8px; border: 1.5px dashed #F3B557; border-radius: 6px; background: #fffef8; min-height: 36px; }
.main { max-width: 980px; margin: 0 auto; padding: 26px 22px 60px; }
.topnav { display: flex; gap: 0; margin-bottom: 22px; border-bottom: 2px solid var(--border); }
.topnav-tab { padding: 10px 22px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text3); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
.topnav-tab:hover { color: var(--text2); }
.topnav-tab.active { color: #152840; border-bottom-color: #7EC5B3; font-weight: 600; }
.ptabs { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 18px; }
.ptab { padding: 8px 16px; border-radius: 22px; border: 1.5px solid var(--border2); background: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all .15s; }
.ptab:hover { border-color: #aaa; }
.card { background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
.card-top { padding: 1.2rem 1.5rem 1rem; border-top: 4px solid; }
.card-name { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.card-sub { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.tagline { font-size: 13px; font-style: italic; padding: 8px 12px; border-radius: 8px; border-left: 3px solid; }
.itabs { display: flex; gap: 5px; flex-wrap: wrap; padding: .8rem 1.5rem .65rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg2); }
.itab { padding: 5px 13px; border-radius: 16px; border: 1px solid var(--border2); font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text2); background: var(--bg); transition: all .15s; }
.itab:hover { border-color: #aaa; }
.kbody { padding: 1.2rem 1.5rem; }
.slbl { font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--text3); text-transform: uppercase; margin-bottom: 11px; }
.desc { font-size: 14px; color: var(--text2); line-height: 1.75; margin-bottom: 1.1rem; }
.drv { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13.5px; color: var(--text2); line-height: 1.55; }
.dnum { font-weight: 600; min-width: 18px; flex-shrink: 0; }
.pill { display: inline-block; padding: 4px 11px; border-radius: 12px; font-size: 12px; font-weight: 500; margin: 3px 3px 0 0; }
.pts-stack { display: flex; flex-direction: column; gap: 10px; }
.pt-item { display: flex; gap: 12px; padding: 11px 14px; background: var(--bg2); border-radius: 8px; border-left: 3px solid; border-left-color: inherit; }
.pt-num { font-size: 13px; font-weight: 700; flex-shrink: 0; min-width: 18px; margin-top: 1px; }
.pt-text { font-size: 13px; color: var(--text2); line-height: 1.7; font-style: italic; }
.avoid-box { font-size: 13.5px; color: var(--text2); line-height: 1.7; margin-top: .9rem; padding: 10px 14px; background: var(--bg2); border-radius: 8px; border-left: 3px solid #F3B557; }
.mi { display: flex; gap: 9px; margin-bottom: 9px; font-size: 13.5px; color: var(--text2); line-height: 1.55; }
.chk { flex-shrink: 0; margin-top: 2px; font-size: 15px; }
.obj { margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.othey { padding: 9px 13px; font-size: 13px; font-style: italic; background: #fff5f5; color: #b03030; }
.oyou { padding: 9px 13px; font-size: 13px; background: var(--bg2); color: var(--text2); }
.olbl { font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
.msgbox { border-radius: 8px; padding: 14px 16px; font-size: 14px; font-style: italic; line-height: 1.7; border-left: 4px solid; background: var(--bg2); color: var(--text); }
.msghint { font-size: 12px; color: var(--text3); margin-top: .85rem; line-height: 1.6; }
.cgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.cc { border-radius: 8px; border: 1px solid var(--border); padding: 11px 12px; background: var(--bg2); }
.ccn { font-size: 12px; font-weight: 600; margin-bottom: 7px; }
.cbullets { list-style: none; padding: 0; margin: 0; }
.cbullets li { font-size: 11.5px; color: var(--text2); line-height: 1.55; padding: 3px 0 3px 14px; border-bottom: 1px solid var(--border); position: relative; }
.cbullets li:last-child { border-bottom: none; }
.cbullets li::before { content: "·"; position: absolute; left: 3px; color: var(--text3); font-weight: 700; font-size: 14px; line-height: 1.35; }
.section-block { margin-bottom: 1.4rem; }
.sa-hero { background: #152840; border-radius: var(--radius); padding: 1.8rem 2rem 1.5rem; margin-bottom: 1.2rem; }
.sa-hero h2 { font-size: 21px; font-weight: 700; color: #7EC5B3; margin-bottom: 6px; }
.sa-hero p { font-size: 14px; color: #a8c8d8; line-height: 1.7; max-width: 700px; }
.pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.2rem; }
.pillar { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; background: var(--bg); box-shadow: var(--shadow); }
.pillar-head { padding: 12px 14px 10px; }
.pillar-num { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
.pillar-title { font-size: 16px; font-weight: 700; color: var(--text); }
.pillar-body { padding: 10px 14px 13px; font-size: 13px; color: var(--text2); line-height: 1.65; }
.rules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.rule-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; }
.rule-icon { font-size: 18px; margin-bottom: 7px; }
.rule-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
.rule-body { font-size: 12.5px; color: var(--text2); line-height: 1.6; }
.tone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tone-from { background: #fff5f5; border: 1px solid #fdd; border-radius: var(--radius); padding: 13px 14px; }
.tone-to { background: #f0faf7; border: 1px solid #c8e8df; border-radius: var(--radius); padding: 13px 14px; }
.tone-lbl { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
.tone-item { display: flex; gap: 8px; margin-bottom: 7px; font-size: 13px; line-height: 1.5; align-items: flex-start; }
.phase-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.phase-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.phase-head { padding: 14px 16px 12px; }
.phase-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.phase-sub { font-size: 12px; color: rgba(255,255,255,0.8); }
.phase-body { padding: 10px 14px 12px; }
.tpl-item { display: flex; align-items: flex-start; gap: 9px; padding: 9px 0; border-bottom: 1px solid var(--border); transition: all .12s; }
.tpl-item:last-child { border-bottom: none; }
.tpl-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.tpl-info { flex: 1; }
.tpl-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.tpl-desc { font-size: 11.5px; color: var(--text3); line-height: 1.45; }
.tpl-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
.badge-soon { background: #f0f4f8; color: var(--text3); }
.tpl-open-btn{display:inline-block;font-size:11px;font-weight:600;padding:5px 12px;border-radius:8px;background:#347969;color:#fff;text-decoration:none;white-space:nowrap;transition:background .15s}
.tpl-open-btn:hover{background:#2a5e52}
.sc-tpl-list{margin-top:.9rem;padding:.7rem 1rem;background:var(--bg2);border-radius:8px;border:0.5px solid var(--border)}
.sc-tpl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:.4rem}
.sc-tpl-item{font-size:12px;color:var(--text2);padding:2px 0;line-height:1.5}
.badge-ready { background: #e8f7f3; color: #347969; }
.templates-note { margin-top: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: var(--text2); line-height: 1.65; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg); border-radius: 12px; padding: 24px 28px; max-width: 440px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.modal p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.toast { position: fixed; bottom: 28px; right: 28px; background: #152840; color: #fff; padding: 11px 18px; border-radius: 9px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all .3s; z-index: 300; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
@media(max-width:720px){.pillars,.phase-grid{grid-template-columns:1fr 1fr}.cgrid{grid-template-columns:repeat(2,1fr)}.two-col,.rules-grid,.tone-grid{grid-template-columns:1fr}.main{padding:14px 12px 40px}.topbar{padding:11px 14px}.topbar-tag{display:none}}
@media(max-width:480px){.pillars,.phase-grid{grid-template-columns:1fr}}
.sc-toggle{display:flex;gap:8px;margin-bottom:1.2rem;align-items:center}
.sc-vbtn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);transition:all .15s}
.sc-vbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.sc-vbtn:hover:not(.active){border-color:#aaa;color:var(--text)}
.sc-note{font-size:12px;color:var(--text3);margin-left:auto}
.ep-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.2rem}
.ep-card{border-radius:var(--radius);padding:14px 12px;cursor:pointer;border:2px solid transparent;transition:all .15s;text-align:center}
.ep-card:hover{opacity:.88}
.ep-card.active{border-color:currentColor;box-shadow:0 0 0 3px rgba(0,0,0,0.07)}
.ep-icon{font-size:22px;margin-bottom:6px}
.ep-name{font-size:13px;font-weight:500;margin-bottom:3px}
.ep-sub{font-size:11px;opacity:.7}
.sc-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1rem}
.sc-head{padding:.9rem 1.25rem;border-bottom:1px solid var(--border)}
.sc-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:3px}
.sc-sub{font-size:12px;color:var(--text2)}
.sc-steps{display:flex;align-items:center;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);background:var(--bg2);gap:0;overflow-x:auto}
.sc-sbtn{flex-shrink:0;padding:5px 13px;border-radius:14px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);white-space:nowrap;transition:all .15s}
.sc-sbtn.active{color:#fff;border-color:transparent}
.sc-arr{flex-shrink:0;font-size:10px;color:var(--text3);margin:0 3px}
.sc-body{padding:1.1rem 1.25rem}
.sc-what{font-size:14px;font-weight:500;color:var(--text);margin-bottom:.5rem}
.sc-desc{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:.85rem}
.sc-rule{font-size:13px;color:var(--text2);line-height:1.65;padding:9px 14px 9px 14px;border-radius:0;background:transparent;border-left:none;border-bottom:1px solid var(--border);margin-bottom:0;display:flex;gap:10px;align-items:flex-start}
.rules-list{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:.5rem}
.sc-rule-num{font-size:12px;font-weight:700;min-width:20px;flex-shrink:0;padding-top:1px}
.sc-rule-text{font-size:13px;color:var(--text2);line-height:1.65}
.sc-rule:last-child{border-bottom:none}
.sc-warn{font-size:12.5px;line-height:1.6;padding:8px 12px;border-radius:7px;background:#fff5f5;border:0.5px solid #fdd;color:#b03030;margin-top:.75rem;margin-bottom:.5rem}
.sc-good{font-size:12.5px;line-height:1.6;padding:8px 12px;border-radius:7px;background:#f0faf7;border:0.5px solid #c8e8df;color:#1B6B3A;margin-top:.75rem;margin-bottom:.5rem}
.sc-info{font-size:12.5px;line-height:1.6;padding:8px 12px;border-radius:7px;background:#e8f4ff;border:0.5px solid #b5d4f4;color:#183B68;margin-top:.75rem;margin-bottom:.5rem}
.br-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:.8rem}
.br-item{border-radius:8px;padding:9px 12px;font-size:12px;line-height:1.55}
.br-item strong{display:block;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.fmt-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:.8rem}
.fmt-c{border-radius:8px;padding:10px 12px;border:0.5px solid var(--border);background:var(--bg2)}
.fmt-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;margin-bottom:5px}
.fmt-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px}
.fmt-det{font-size:11.5px;color:var(--text2);line-height:1.5}
.obj-stack{display:flex;flex-direction:column;gap:8px;margin-top:.8rem}
.obj-row{border-radius:8px;overflow:hidden;border:0.5px solid var(--border)}
.obj-q{padding:8px 12px;font-size:12.5px;font-style:italic;background:#fff5f5;color:#b03030}
.obj-a{padding:8px 12px;font-size:12.5px;background:var(--bg2);color:var(--text2)}
.obj-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.cad-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:.8rem}
.cad-card{border-radius:8px;padding:10px 12px;border-left:3px solid}
.cad-day{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.cad-text{font-size:12px;color:var(--text2);line-height:1.55}
.sc-links{display:flex;gap:7px;flex-wrap:wrap;margin-top:.9rem;padding-top:.8rem;border-top:1px solid var(--border)}
.sc-lbtn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:9px;background:var(--bg2);border:0.5px solid var(--border2);cursor:pointer;color:var(--text2);transition:all .15s}
.sc-lbtn:hover{color:var(--text);border-color:#aaa}
.map-scroller{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg)}
.mf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.mf-stage{border-radius:var(--radius);padding:12px 10px;cursor:pointer;border:2px solid transparent;text-align:center;transition:all .15s}
.mf-stage:hover{opacity:.88}
.mf-stage.active{border-color:currentColor}
.mf-sn{font-size:13px;font-weight:500;margin-bottom:2px}
.mf-ss{font-size:11px;opacity:.7}




</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">YOUTH<span>TO</span>PRO</div>
    <div class="topbar-tag">Business Development Toolkit</div>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="toggleEdit()" id="editBtn">✏️ Edit mode</button>
    <button class="btn btn-save" onclick="saveToFile()">⬇ Save HTML</button>
  </div>
</div>
<div class="edit-bar" id="editBar">
  <strong>Edit mode on</strong> — click any text to edit directly. Hit Save HTML when done.
  <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="toggleEdit()">Done</button>
</div>
<div class="main">
  <div class="topnav">
    <button class="topnav-tab active" onclick="showView('strategic',this)">Strategic Alignment</button>
    <button class="topnav-tab" onclick="showView('personas',this)">Partner Personas</button>
    <button class="topnav-tab" onclick="showView('scenarios',this)">BD Scenario Flows</button>
    <button class="topnav-tab" onclick="showView('templates',this)">Templates</button>
  </div>
  <div id="view-strategic"></div>
  <div id="view-personas" style="display:none"></div>
  <div id="view-scenarios" style="display:none"></div>
  <div id="view-templates" style="display:none"></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Save your changes</h3>
    <p>Downloads a new HTML file with all your edits baked in. Open in any browser — no internet needed.</p>
    <div class="modal-actions">
      <button class="btn" style="background:var(--bg3);color:var(--text2);border:none" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="doSave()">Download</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">✓ Saved successfully</div>
<script>
let _ORIGINAL_SRC=null; // loaded after DOM ready
const PERSONAS=[
{id:0,name:"Foundations & NGOs",sub:"Regional & International Grant-Makers",col:"#347969",tl:"Partners in structured, measurable impact",
who:"Program officers, directors, and senior leadership at MENA-focused foundations — including USAID, EU delegation offices, Arab Fund for Economic and Social Development, national welfare associations, and diaspora philanthropic foundations. They operate within formal grant cycles (typically 12–36 months), report upward to boards or government ministries, and are professionally accountable for the measurable outcomes of every programme they fund. Their reputation — and continued funding authority — depends on being able to demonstrate that their grants produced verifiable change, not just activity. They are drawn to organisations that speak their language: theory of change, logical frameworks, beneficiary reach, and sustainability beyond the grant period. Many have been burned by programmes that looked good on paper but couldn't produce outcome data at review time.",
drivers:["Documented, KPI-tracked impact that protects their grant reputation and satisfies board and donor scrutiny","Youth unemployment reduction — a flagship regional policy priority aligned with their mandate","Programs that demonstrate a clear path to financial sustainability beyond grant dependency","Credible, experienced local implementation partners who meet international programme standards","Geographic reach across multiple priority countries — Jordan, Lebanon, Egypt, and expanding","Clear reporting architecture they can present to their own funders without building it themselves"],
lang:["Theory of change","Measurable outcomes","Beneficiary reach","Programme fidelity","Cost per beneficiary"],
avoid:"Don't say \"we need your support\" or lead with the organisation's story. Don't use anecdotal impact without data attached. Don't present without a clear reporting structure. Don't position as charity — position as a structured programme with a proven methodology and outcome data.",
pts:["1 in 4 Arab graduates cannot find work — not because of lack of qualification, but because of a structural transition gap. YouthToPro is the only programme in the region built specifically to close it.",

{id:2,name:"Corporate HR & Talent",sub:"HR Directors, CHROs, and Talent Acquisition Managers",col:"#8589A2",tl:"A structured talent pipeline — vetted, mentored, and ready to hire",
who:"HR Directors, CHROs, and Talent Acquisition Managers at mid-to-large corporates across the Gulf, Levant, and Egypt. These are operational decision-makers — not philanthropists, not CSR officers. They are measured on time-to-hire, quality of hire, retention rates, and increasingly on Emiratisation or Saudisation compliance targets. They are not primarily motivated by social impact — they are motivated by solving a real workforce problem: the gap between what universities produce and what their business needs. They have seen too many graduate recruits who are technically qualified but professionally unprepared — no workplace communication skills, no professional network, no sense of how to navigate a career. YouthToPro solves that gap for them before the candidate ever reaches their job posting. The best HR partners see us not as a charity they support but as a talent infrastructure they plug into.",
drivers:["Pre-screened, mentor-developed graduate candidates before competitors see them","Reduced time-to-hire and lower cost-per-hire on junior and mid-level roles","Structured pipeline that meets Emiratisation, Saudisation, or nationalisation targets","Graduates who arrive with professional readiness — communication, workplace etiquette, career clarity","A documented talent programme they can report upward as an HR initiative, not just a spend line","Employee engagement through a structured mentoring programme that develops their own senior staff"],
lang:["Talent pipeline","Graduate readiness","Time-to-hire","Quality of hire","Employer branding"],

function darken(h){
  // Returns a darker shade of the hex colour for readable text on light bg
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  const f=0.75;
  return'#'+[r,g,b].map(v=>Math.round(v*f).toString(16).padStart(2,'0')).join('');
}
function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function isLight(c){return['#F3B557','#7EC5B3'].includes(c);}
function tc(c){return isLight(c)?'#152840':'#fff';}

function renderTemplates(){
  const p=TEMPLATES[0];
  const col=p.col||'#152840';
  document.getElementById('view-templates').innerHTML=`
    <div class="card">
      <div class="card-top" style="border-top-color:${col}">
        <div class="card-name">${p.phase}</div>
        <div class="card-sub">${p.sub}</div>
      </div>
      <div class="phase-body">
        ${p.items.map(t=>`
          <div class="tpl-item">
            <div class="tpl-info">
              <div class="tpl-name">${t.name}</div>
              <div class="tpl-desc">${t.desc}</div>
            </div>
            ${t.badge==='ready'?`<a href="${t.url}" target="_blank" class="tpl-open-btn">Open ↗</a>`:`<span class="badge-soon">Coming</span>`}
          </div>`).join('')}
      </div>
    </div>
    <div class="templates-note">
      <strong>📌 How this works:</strong> Each template will be linked to a working document — Word, PDF, or Google Doc — once built. Templates marked <em>Coming</em> are queued for build.
    </div>`;
}

let sc_journeyIdx=0, sc_stepIdx=0, sc_view='cards';

function renderScenarios(){
  const el=document.getElementById('view-scenarios');
  el.innerHTML=`<div id="sc-main"></div>`;
  scRenderCards();
}

function scSetView(v){
  sc_view=v;
  const main=document.getElementById('sc-main');
  if(!main) return;
  if(v==='journey') scRenderJourney();
  else { sc_view='cards'; scRenderCards(); }
}

function scHover(el,col,on){
  el.style.borderColor=on?col:'var(--border)';
  el.style.boxShadow=on?'0 4px 20px rgba(0,0,0,0.1)':'var(--shadow)';
}
function scRenderCards(){
  sc_view='cards';
  const main=document.getElementById('sc-main');
  if(!main) return;
  main.innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:.5rem">
    ${SC_JOURNEYS.map((j,i)=>`
    <div onclick="scOpenJourney(${i})" onmouseover="scHover(this,'${j.col}',true)" onmouseout="scHover(this,'${j.col}',false)"
      style="background:var(--bg);border-radius:var(--radius);padding:1.6rem 1.75rem;cursor:pointer;border:1px solid var(--border);transition:all .18s;box-shadow:var(--shadow)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <span style="font-size:24px;color:${j.col};font-weight:300">${j.icon}</span>
        <span style="font-size:11px;color:var(--text3);font-weight:500">${j.steps.length} steps →</span>
      </div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:5px">${j.name}</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.55">${j.sub}</div>
      <div style="margin-top:1.1rem;height:3px;border-radius:2px;background:${j.col};opacity:0.25;width:100%"></div>
    </div>`).join('')}
  </div>`;
}

function scOpenJourney(i){
  sc_journeyIdx=i;
  sc_stepIdx=0;
  sc_view='journey';
  scRenderJourney();
}

function scRenderJourney(){
  const j=SC_JOURNEYS[sc_journeyIdx];
  const main=document.getElementById('sc-main');
  if(!main) return;

  // Phase labels
  const phaseLabel={outreach:'Outreach',meeting:'The Meeting',after:'Follow-up'};
  const phaseCols={outreach:j.col,meeting:'#534AB7',after:'#085041'};
  const phaseBgs={outreach:j.bg,meeting:'#EEEDFE',after:'#E1F5EE'};

  // Group steps by phase for the stepper
  let lastPhase='';
  const stepperHTML=j.steps.map((s,i)=>{
    const isActive=i===sc_stepIdx;
    const isDone=i<sc_stepIdx;
    const phaseChange=s.phase!==lastPhase;
    lastPhase=s.phase;
    const phasePill=phaseChange?`<div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${phaseCols[s.phase]};margin-bottom:5px;padding-left:2px">${phaseLabel[s.phase]||s.phase}</div>`:'';
    return `${phasePill}<button class="sc-step-btn" onclick="scGoStep(${i})" style="display:block;width:100%;text-align:left;padding:8px 11px;border-radius:8px;border:1.5px solid ${isActive?phaseCols[s.phase]:'var(--border)'};background:${isActive?phaseBgs[s.phase]:'transparent'};cursor:pointer;margin-bottom:5px;transition:all .15s;font-size:12.5px;font-weight:${isActive?'600':'400'};color:${isActive?phaseCols[s.phase]:isDone?'var(--text3)':'var(--text2)'}">${s.name}</button>`;
  }).join('');

  const s=j.steps[sc_stepIdx];
  const pCol=phaseCols[s.phase]||j.col;
  const pBg=phaseBgs[s.phase]||j.bg;

  main.innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)">
    <button onclick="scSetView('cards')" style="padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px">← Back</button>
    <span style="font-size:15px;font-weight:600;color:${j.col}">${j.name}</span>
    <span style="font-size:12px;color:var(--text3)">${j.sub}</span>
  </div>
  <div style="display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start">
    <div style="background:var(--bg2);border-radius:var(--radius);padding:12px;border:1px solid var(--border)">
      ${stepperHTML}
    </div>
    <div class="sc-card" id="sc-step-card"></div>
  </div>`;

  scRenderStep();
  if(editMode) setTimeout(activateEditMode,60);
}

function scGoStep(i){
  const _j=SC_JOURNEYS[sc_journeyIdx];
  if(!_j||i<0||i>=_j.steps.length) return;
  sc_stepIdx=i;
  // Update stepper button active states
  const j=SC_JOURNEYS[sc_journeyIdx];
  const phaseCols={outreach:j.col,meeting:'#534AB7',after:'#085041'};
  const phaseBgs={outreach:j.bg,meeting:'#EEEDFE',after:'#E1F5EE'};
  document.querySelectorAll('.sc-step-btn').forEach((btn,idx)=>{
    const s=j.steps[idx];
    const isActive=idx===i;
    const isDone=idx<i;
    const c=phaseCols[s.phase]||j.col;
    const bg=phaseBgs[s.phase]||j.bg;
    btn.style.borderColor=isActive?c:'var(--border)';
    btn.style.background=isActive?bg:'transparent';
    btn.style.color=isActive?c:isDone?'var(--text3)':'var(--text2)';
    btn.style.fontWeight=isActive?'600':'400';
  });
  scRenderStep();
  if(editMode) setTimeout(activateEditMode,60);
}

function scRenderStep(){
  const _j2=SC_JOURNEYS[sc_journeyIdx];
  if(!_j2||sc_stepIdx<0||sc_stepIdx>=_j2.steps.length) return;
  const card=document.getElementById('sc-step-card');
  if(!card) return;
  const j=SC_JOURNEYS[sc_journeyIdx];
  const s=j.steps[sc_stepIdx];
  const phaseCols={outreach:j.col,meeting:'#534AB7',after:'#085041'};
  const phaseLabel={outreach:'Outreach',meeting:'The Meeting',after:'Follow-up'};
  const c=phaseCols[s.phase]||j.col;

  const prev=sc_stepIdx>0?`<button onclick="scGoStep(${sc_stepIdx-1})" style="padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text2)">← Previous</button>`:'<span></span>';
  const next=sc_stepIdx<j.steps.length-1?`<button onclick="scGoStep(${sc_stepIdx+1})" style="padding:6px 14px;border-radius:8px;border:none;background:${c};cursor:pointer;font-size:12px;color:#fff;font-weight:500">Next →</button>`:'<span style="font-size:12px;color:var(--text3);padding:6px 0">End of journey</span>';

  card.innerHTML=`
  <div class="sc-head">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${c};background:${j.bg};padding:3px 9px;border-radius:8px">${phaseLabel[s.phase]||s.phase}</span>
      <span style="font-size:12px;color:var(--text3)">${sc_stepIdx+1} of ${j.steps.length}</span>
    </div>
    <div class="sc-title">${s.name}</div>
  </div>
  <div class="sc-body">${scStepHTML(s,c)}</div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 1.25rem;border-top:1px solid var(--border)">${prev}${next}</div>`;
}


function scStepHTML(st,c){
  let h=`<div class="sc-what">${st.title}</div><div class="sc-desc">${st.desc}</div>`;
  if(st.rules)h+=`<div class="rules-list">`+st.rules.map((r,i)=>`<div class="sc-rule"><span class="sc-rule-num" style="color:${c}">${i+1}</span><span class="sc-rule-text">${r}</span></div>`).join('')+`</div>`;
  if(st.fmt)h+=`<div class="fmt-grid2">
    <div class="fmt-c"><span class="fmt-tag" style="background:#E6F1FB;color:#0C447C">20–30 min</span><div class="fmt-title">Discovery call</div><div class="fmt-det">No deck. Qualify and listen. Close for a formal meeting with a date.</div></div>
    <div class="fmt-c"><span class="fmt-tag" style="background:#E1F5EE;color:#085041">45–90 min</span><div class="fmt-title">First formal meeting</div><div class="fmt-det">Optional deck. Bring one-pager. Close for proposal or next meeting.</div></div>
    <div class="fmt-c"><span class="fmt-tag" style="background:#EEEDFE;color:#3C3489">60–120 min</span><div class="fmt-title">Board / committee pitch</div><div class="fmt-det">Full deck. Multiple leave-behinds. Close for proposal review date.</div></div>
    <div class="fmt-c"><span class="fmt-tag" style="background:#FAEEDA;color:#633806">Open</span><div class="fmt-title">Informal / social</div><div class="fmt-det">No deck. Relationship first. Close for a follow-up call within 2 weeks.</div></div>
  </div>`;
  if(st.warn)h+=`<div class="sc-warn">${st.warn}</div>`;
  if(st.good)h+=`<div class="sc-good">${st.good}</div>`;
  if(st.info)h+=`<div class="sc-info">${st.info}</div>`;
  if(st.branches)h+=`<div class="br-grid">${st.branches.map(b=>{
    const bg={good:'var(--bg2)',neutral:'var(--bg3)',warn:'#fff5f5'};
    const bd={good:'var(--border)',neutral:'var(--border2)',warn:'#fdd'};
    const tx={good:c,neutral:'var(--text3)',warn:'#c03030'};
    return`<div class="br-item" style="background:${bg[b.type]};border:0.5px solid ${bd[b.type]}"><strong style="color:${tx[b.type]}">${b.label}</strong><span style="color:var(--text2)">${b.text}</span></div>`;
  }).join('')}</div>`;
  if(st.objections)h+=`<div class="obj-stack">${st.objections.map(o=>`
    <div class="obj-row">
      <div class="obj-q"><div class="obj-lbl">They say</div>${o.q}</div>
      <div class="obj-a"><div class="obj-lbl" style="color:${c}">You say</div>${o.a}</div>
    </div>`).join('')}</div>`;
  if(st.templates&&st.templates.length)h+=`<div class="sc-tpl-list"><div class="sc-tpl-label">Templates that can help</div>${st.templates.map(t=>`<div class="sc-tpl-item">• ${t}</div>`).join('')}</div>`;
  return h;
}


function toggleEdit(){
  editMode=!editMode;
  document.getElementById('editBtn').textContent=editMode?'✅ Exit edit mode':'✏️ Edit mode';
  document.getElementById('editBar').className='edit-bar'+(editMode?' show':'');
  document.body.classList.toggle('edit-on',editMode);
  if(editMode) activateEditMode();
  else deactivateEditMode();
}

function _ed(el,cb){
  if(!el||el.closest('button')||el.closest('[onclick]')) return;
  el.contentEditable='true';
  if(cb){ el._cb=function(){ cb(this.innerText.trim()); }; el.addEventListener('input',el._cb); }
}

function activateEditMode(){
  // ── PERSONAS TAB ──
  _ed(document.querySelector('.card-name'), v=>{ PERSONAS[ai].name=v; });
  _ed(document.querySelector('.card-sub'),  v=>{ PERSONAS[ai].sub=v; });
  _ed(document.querySelector('.tagline'),   v=>{ PERSONAS[ai].tl=v.replace(/^["\u201C]|["\u201D]$/g,''); });
  _ed(document.querySelector('.desc'),      v=>{ PERSONAS[ai].who=v; });
  _ed(document.querySelector('.avoid-box'), v=>{ PERSONAS[ai].avoid=v; });
  _ed(document.querySelector('.msgbox'),    v=>{ PERSONAS[ai].msg=v.replace(/^["\u201C]|["\u201D]$/g,''); });
  document.querySelectorAll('.drv').forEach((el,i)=>{
    _ed(el.querySelector('span:last-child'), v=>{ if(PERSONAS[ai].drivers[i]!==undefined) PERSONAS[ai].drivers[i]=v; });
  });
  document.querySelectorAll('.mi').forEach((el,i)=>{
    _ed(el.querySelector('span:last-child'), v=>{ if(PERSONAS[ai].map[i]!==undefined) PERSONAS[ai].map[i]=v; });
  });
  document.querySelectorAll('.pill').forEach((el,i)=>{
    _ed(el, v=>{ if(PERSONAS[ai].lang[i]!==undefined) PERSONAS[ai].lang[i]=v; });
  });
  document.querySelectorAll('.obj-row').forEach((el,i)=>{
    _ed(el.querySelector('.othey span'), v=>{ if(PERSONAS[ai].obj[i]) PERSONAS[ai].obj[i].t=v; });
    _ed(el.querySelector('.oyou span'),  v=>{ if(PERSONAS[ai].obj[i]) PERSONAS[ai].obj[i].y=v; });
  });
  document.querySelectorAll('.pt-text').forEach((el,i)=>{
    _ed(el, v=>{ if(PERSONAS[ai].pts&&PERSONAS[ai].pts[i]!==undefined) PERSONAS[ai].pts[i]=v; });
  });
  document.querySelectorAll('.cc').forEach((el,i)=>{
    _ed(el.querySelector('.ccn'), v=>{ if(PERSONAS[ai].ctry[i]) PERSONAS[ai].ctry[i].n=v; });
    el.querySelectorAll('.cbullets li').forEach((li,j)=>{
      _ed(li, v=>{ if(PERSONAS[ai].ctry[i]&&Array.isArray(PERSONAS[ai].ctry[i].t)) PERSONAS[ai].ctry[i].t[j]=v; });
    });
  });
  // ── STRATEGIC ALIGNMENT TAB ──
  document.querySelectorAll('[data-skey]').forEach(el=>{
    const key=el.dataset.skey;
    _ed(el, v=>{
      const parts=key.split('.');
      if(parts.length===1){ STRATEGIC[key]=v; }
      else if(parts.length===2){ STRATEGIC[parts[0]][parseInt(parts[1])]=v; }
      else if(parts.length===3){ STRATEGIC[parts[0]][parseInt(parts[1])][parts[2]]=v; }
    });
  });
  // ── BD SCENARIOS — SC_JOURNEYS ──
  const stepCard=document.getElementById('sc-step-card');
  if(stepCard&&SC_JOURNEYS[sc_journeyIdx]){
    const jS=SC_JOURNEYS[sc_journeyIdx].steps[sc_stepIdx];
    const _q=stepCard.querySelector('.sc-what'); if(_q) _ed(_q, v=>{ if(jS) jS.title=v; });
    const _d=stepCard.querySelector('.sc-desc'); if(_d) _ed(_d, v=>{ if(jS) jS.desc=v; });
    stepCard.querySelectorAll('.sc-rule-text').forEach((el,i)=>{ _ed(el, v=>{ if(jS&&jS.rules) jS.rules[i]=v; }); });
    stepCard.querySelectorAll('.sc-warn').forEach(el=>{ _ed(el, v=>{ if(jS) jS.warn=v; }); });
    stepCard.querySelectorAll('.sc-good').forEach(el=>{ _ed(el, v=>{ if(jS) jS.good=v; }); });
    stepCard.querySelectorAll('.sc-info').forEach(el=>{ _ed(el, v=>{ if(jS) jS.info=v; }); });
    stepCard.querySelectorAll('.obj-row').forEach((el,i)=>{
      _ed(el.querySelector('.obj-q'), v=>{ if(jS&&jS.objections) jS.objections[i].q=v; });
      _ed(el.querySelector('.obj-a'), v=>{ if(jS&&jS.objections) jS.objections[i].a=v; });
    });
  }
  // ── TEMPLATES TAB ──
  const pi=tplIdx||0;
  document.querySelectorAll('.tpl-name').forEach((el,ti)=>{

    _ed(el, v=>{ if(TEMPLATES[pi]&&TEMPLATES[pi].items[ti]) TEMPLATES[pi].items[ti].desc=v; });
  });
}

function deactivateEditMode(){
  document.querySelectorAll('[contenteditable="true"]').forEach(el=>{
    if(el._cb) el.removeEventListener('input',el._cb);
    el.removeAttribute('contenteditable');
  });
}

function showView(view,btn){
  currentView=view;
  document.querySelectorAll('.topnav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['strategic','personas','scenarios','templates'].forEach(v=>{
    document.getElementById('view-'+v).style.display=v===view?'':'none';
  });
  if(view==='strategic')renderStrategic();
  if(view==='personas')renderPersonas();
  if(view==='scenarios')renderScenarios();
  if(view==='templates')renderTemplates();
  if(editMode) setTimeout(activateEditMode,60);
}



// ── HELPER: replace array/object in HTML source ──
function repArr(html, name, val){
  return html.replace(new RegExp('(const '+name+'=)\\[[\\s\\S]*?\\];(\\s*(?:const|let|var|function|//))'),
    function(m,a,b){ return a+JSON.stringify(val)+';'+b; });
}
function repObj(html, name, val){
  return html.replace(new RegExp('(const '+name+'=)\\{[\\s\\S]*?\\};(\\s*(?:const|let|var|function|//))'),
    function(m,a,b){ return a+JSON.stringify(val)+';'+b; });
}

// ── SAVE — DOWNLOAD UPDATED HTML ──
function saveToFile(){ doSave(); }
function saveToSharePoint(){ doSave(); }
function saveToGitHub(){ doSave(); }

function doSave(){
  const btn = document.getElementById('save-btn');
  const origText = btn ? btn.textContent : '↓ Save HTML';
  try {
    let html = _ORIGINAL_SRC;
    if(!html){ const el=document.getElementById('_src'); if(el) _ORIGINAL_SRC=el.value; html=_ORIGINAL_SRC; }
    if(!html){ alert('Source not available. Please reload.'); return; }

    html = repArr(html, 'PERSONAS', PERSONAS);
    html = repArr(html, 'TEMPLATES', TEMPLATES);
    html = repObj(html, 'STRATEGIC', STRATEGIC);

    const escaped = html.replace(/<\/textarea>/g,'<\\/textarea>');
    const newSrc = html.replace(/(<textarea id="_src"[^>]*>)[\s\S]*?(<\/textarea>)/,
      function(m,o,c){ return o+escaped+c; })||html;

    const blob = new Blob([newSrc], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'YouthToPro_BD_Toolkit_v2.html';
    a.click();
    URL.revokeObjectURL(a.href);

    if(btn){ btn.textContent='✓ Downloaded'; btn.style.background='#347969'; }
    const t=document.getElementById('toast');
    if(t){ t.className='toast show'; setTimeout(()=>t.className='toast',2500); }
    setTimeout(()=>{ if(btn){ btn.textContent=origText; btn.style.background=''; }},3000);
  } catch(e){
    alert('Save failed: '+e.message);
    if(btn) btn.textContent=origText;
  }
}

function darken(h){
  // Returns a darker shade of the hex colour for readable text on light bg
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  const f=0.75;
  return'#'+[r,g,b].map(v=>Math.round(v*f).toString(16).padStart(2,'0')).join('');
}
function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function isLight(c){return['#F3B557','#7EC5B3'].includes(c);}
function tc(c){return isLight(c)?'#152840':'#fff';}

  return'';
}

let sc_journeyIdx=0, sc_stepIdx=0, sc_view='cards';

function renderScenarios(){
  const el=document.getElementById('view-scenarios');
  el.innerHTML=`<div id="sc-main"></div>`;
  scRenderCards();
}

function scSetView(v){
  sc_view=v;
  const main=document.getElementById('sc-main');
  if(!main) return;
  if(v==='journey') scRenderJourney();
  else { sc_view='cards'; scRenderCards(); }
}

function scHover(el,col,on){
  el.style.borderColor=on?col:'var(--border)';
  el.style.boxShadow=on?'0 4px 20px rgba(0,0,0,0.1)':'var(--shadow)';
}
function scRenderCards(){
  sc_view='cards';
  const main=document.getElementById('sc-main');
  if(!main) return;
  main.innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:.5rem">
    ${SC_JOURNEYS.map((j,i)=>`
    <div onclick="scOpenJourney(${i})" onmouseover="scHover(this,'${j.col}',true)" onmouseout="scHover(this,'${j.col}',false)"
      style="background:var(--bg);border-radius:var(--radius);padding:1.6rem 1.75rem;cursor:pointer;border:1px solid var(--border);transition:all .18s;box-shadow:var(--shadow)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <span style="font-size:24px;color:${j.col};font-weight:300">${j.icon}</span>
        <span style="font-size:11px;color:var(--text3);font-weight:500">${j.steps.length} steps →</span>
      </div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:5px">${j.name}</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.55">${j.sub}</div>
      <div style="margin-top:1.1rem;height:3px;border-radius:2px;background:${j.col};opacity:0.25;width:100%"></div>
    </div>`).join('')}
  </div>`;
}

function scOpenJourney(i){
  sc_journeyIdx=i;
  sc_stepIdx=0;
  sc_view='journey';
  scRenderJourney();
}

function scRenderJourney(){
  const j=SC_JOURNEYS[sc_journeyIdx];
  const main=document.getElementById('sc-main');
  if(!main) return;

  // Phase labels
  const phaseLabel={outreach:'Outreach',meeting:'The Meeting',after:'Follow-up'};
  const phaseCols={outreach:j.col,meeting:'#534AB7',after:'#085041'};
  const phaseBgs={outreach:j.bg,meeting:'#EEEDFE',after:'#E1F5EE'};

  // Group steps by phase for the stepper
  let lastPhase='';
  const stepperHTML=j.steps.map((s,i)=>{
    const isActive=i===sc_stepIdx;
    const isDone=i<sc_stepIdx;
    const phaseChange=s.phase!==lastPhase;
    lastPhase=s.phase;
    const phasePill=phaseChange?`<div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${phaseCols[s.phase]};margin-bottom:5px;padding-left:2px">${phaseLabel[s.phase]||s.phase}</div>`:'';
    return `${phasePill}<button class="sc-step-btn" onclick="scGoStep(${i})" style="display:block;width:100%;text-align:left;padding:8px 11px;border-radius:8px;border:1.5px solid ${isActive?phaseCols[s.phase]:'var(--border)'};background:${isActive?phaseBgs[s.phase]:'transparent'};cursor:pointer;margin-bottom:5px;transition:all .15s;font-size:12.5px;font-weight:${isActive?'600':'400'};color:${isActive?phaseCols[s.phase]:isDone?'var(--text3)':'var(--text2)'}">${s.name}</button>`;
  }).join('');

  const s=j.steps[sc_stepIdx];
  const pCol=phaseCols[s.phase]||j.col;
  const pBg=phaseBgs[s.phase]||j.bg;

  main.innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)">
    <button onclick="scSetView('cards')" style="padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px">← Back</button>
    <span style="font-size:15px;font-weight:600;color:${j.col}">${j.name}</span>
    <span style="font-size:12px;color:var(--text3)">${j.sub}</span>
  </div>
  <div style="display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start">
    <div style="background:var(--bg2);border-radius:var(--radius);padding:12px;border:1px solid var(--border)">
      ${stepperHTML}
    </div>
    <div class="sc-card" id="sc-step-card"></div>
  </div>`;

  scRenderStep();
  if(editMode) setTimeout(activateEditMode,60);
}

function scGoStep(i){
  const _j=SC_JOURNEYS[sc_journeyIdx];
  if(!_j||i<0||i>=_j.steps.length) return;
  sc_stepIdx=i;
  // Update stepper button active states
  const j=SC_JOURNEYS[sc_journeyIdx];
  const phaseCols={outreach:j.col,meeting:'#534AB7',after:'#085041'};
  const phaseBgs={outreach:j.bg,meeting:'#EEEDFE',after:'#E1F5EE'};
  document.querySelectorAll('.sc-step-btn').forEach((btn,idx)=>{
    const s=j.steps[idx];
    const isActive=idx===i;
    const isDone=idx<i;
    const c=phaseCols[s.phase]||j.col;
    const bg=phaseBgs[s.phase]||j.bg;
    btn.style.borderColor=isActive?c:'var(--border)';
    btn.style.background=isActive?bg:'transparent';
    btn.style.color=isActive?c:isDone?'var(--text3)':'var(--text2)';
    btn.style.fontWeight=isActive?'600':'400';
  });
  scRenderStep();
  if(editMode) setTimeout(activateEditMode,60);
}

function scRenderStep(){
  const _j2=SC_JOURNEYS[sc_journeyIdx];
  if(!_j2||sc_stepIdx<0||sc_stepIdx>=_j2.steps.length) return;
  const card=document.getElementById('sc-step-card');
  if(!card) return;
  const j=SC_JOURNEYS[sc_journeyIdx];
  const s=j.steps[sc_stepIdx];
  const phaseCols={outreach:j.col,meeting:'#534AB7',after:'#085041'};
  const phaseLabel={outreach:'Outreach',meeting:'The Meeting',after:'Follow-up'};
  const c=phaseCols[s.phase]||j.col;

  const prev=sc_stepIdx>0?`<button onclick="scGoStep(${sc_stepIdx-1})" style="padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text2)">← Previous</button>`:'<span></span>';
  const next=sc_stepIdx<j.steps.length-1?`<button onclick="scGoStep(${sc_stepIdx+1})" style="padding:6px 14px;border-radius:8px;border:none;background:${c};cursor:pointer;font-size:12px;color:#fff;font-weight:500">Next →</button>`:'<span style="font-size:12px;color:var(--text3);padding:6px 0">End of journey</span>';

  card.innerHTML=`
  <div class="sc-head">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${c};background:${j.bg};padding:3px 9px;border-radius:8px">${phaseLabel[s.phase]||s.phase}</span>
      <span style="font-size:12px;color:var(--text3)">${sc_stepIdx+1} of ${j.steps.length}</span>
    </div>
    <div class="sc-title">${s.name}</div>
  </div>
  <div class="sc-body">${scStepHTML(s,c)}</div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 1.25rem;border-top:1px solid var(--border)">${prev}${next}</div>`;
}


function scStepHTML(st,c){
  let h=`<div class="sc-what">${st.title}</div><div class="sc-desc">${st.desc}</div>`;
  if(st.rules)h+=`<div class="rules-list">`+st.rules.map((r,i)=>`<div class="sc-rule"><span class="sc-rule-num" style="color:${c}">${i+1}</span><span class="sc-rule-text">${r}</span></div>`).join('')+`</div>`;
  if(st.fmt)h+=`<div class="fmt-grid2">
    <div class="fmt-c"><span class="fmt-tag" style="background:#E6F1FB;color:#0C447C">20–30 min</span><div class="fmt-title">Discovery call</div><div class="fmt-det">No deck. Qualify and listen. Close for a formal meeting with a date.</div></div>
    <div class="fmt-c"><span class="fmt-tag" style="background:#E1F5EE;color:#085041">45–90 min</span><div class="fmt-title">First formal meeting</div><div class="fmt-det">Optional deck. Bring one-pager. Close for proposal or next meeting.</div></div>
    <div class="fmt-c"><span class="fmt-tag" style="background:#EEEDFE;color:#3C3489">60–120 min</span><div class="fmt-title">Board / committee pitch</div><div class="fmt-det">Full deck. Multiple leave-behinds. Close for proposal review date.</div></div>
    <div class="fmt-c"><span class="fmt-tag" style="background:#FAEEDA;color:#633806">Open</span><div class="fmt-title">Informal / social</div><div class="fmt-det">No deck. Relationship first. Close for a follow-up call within 2 weeks.</div></div>
  </div>`;
  if(st.warn)h+=`<div class="sc-warn">${st.warn}</div>`;
  if(st.good)h+=`<div class="sc-good">${st.good}</div>`;
  if(st.info)h+=`<div class="sc-info">${st.info}</div>`;
  if(st.branches)h+=`<div class="br-grid">${st.branches.map(b=>{
    const bg={good:'var(--bg2)',neutral:'var(--bg3)',warn:'#fff5f5'};
    const bd={good:'var(--border)',neutral:'var(--border2)',warn:'#fdd'};
    const tx={good:c,neutral:'var(--text3)',warn:'#c03030'};
    return`<div class="br-item" style="background:${bg[b.type]};border:0.5px solid ${bd[b.type]}"><strong style="color:${tx[b.type]}">${b.label}</strong><span style="color:var(--text2)">${b.text}</span></div>`;
  }).join('')}</div>`;
  if(st.objections)h+=`<div class="obj-stack">${st.objections.map(o=>`
    <div class="obj-row">
      <div class="obj-q"><div class="obj-lbl">They say</div>${o.q}</div>
      <div class="obj-a"><div class="obj-lbl" style="color:${c}">You say</div>${o.a}</div>
    </div>`).join('')}</div>`;
  if(st.templates&&st.templates.length)h+=`<div class="sc-tpl-list"><div class="sc-tpl-label">Templates that can help</div>${st.templates.map(t=>`<div class="sc-tpl-item">• ${t}</div>`).join('')}</div>`;
  return h;
}


function toggleEdit(){
  editMode=!editMode;
  document.getElementById('editBtn').textContent=editMode?'✅ Exit edit mode':'✏️ Edit mode';
  document.getElementById('editBar').className='edit-bar'+(editMode?' show':'');
  document.body.classList.toggle('edit-on',editMode);
  if(editMode) activateEditMode();
  else deactivateEditMode();
}

function _ed(el,cb){
  if(!el||el.closest('button')||el.closest('[onclick]')) return;
  el.contentEditable='true';
  if(cb){ el._cb=function(){ cb(this.innerText.trim()); }; el.addEventListener('input',el._cb); }
}

function activateEditMode(){
  // ── PERSONAS TAB ──
  _ed(document.querySelector('.card-name'), v=>{ PERSONAS[ai].name=v; });
  _ed(document.querySelector('.card-sub'),  v=>{ PERSONAS[ai].sub=v; });
  _ed(document.querySelector('.tagline'),   v=>{ PERSONAS[ai].tl=v.replace(/^["\u201C]|["\u201D]$/g,''); });
  _ed(document.querySelector('.desc'),      v=>{ PERSONAS[ai].who=v; });
  _ed(document.querySelector('.avoid-box'), v=>{ PERSONAS[ai].avoid=v; });
  _ed(document.querySelector('.msgbox'),    v=>{ PERSONAS[ai].msg=v.replace(/^["\u201C]|["\u201D]$/g,''); });
  document.querySelectorAll('.drv').forEach((el,i)=>{
    _ed(el.querySelector('span:last-child'), v=>{ if(PERSONAS[ai].drivers[i]!==undefined) PERSONAS[ai].drivers[i]=v; });
  });
  document.querySelectorAll('.mi').forEach((el,i)=>{
    _ed(el.querySelector('span:last-child'), v=>{ if(PERSONAS[ai].map[i]!==undefined) PERSONAS[ai].map[i]=v; });
  });
  document.querySelectorAll('.pill').forEach((el,i)=>{
    _ed(el, v=>{ if(PERSONAS[ai].lang[i]!==undefined) PERSONAS[ai].lang[i]=v; });
  });
  document.querySelectorAll('.obj-row').forEach((el,i)=>{
    _ed(el.querySelector('.othey span'), v=>{ if(PERSONAS[ai].obj[i]) PERSONAS[ai].obj[i].t=v; });
    _ed(el.querySelector('.oyou span'),  v=>{ if(PERSONAS[ai].obj[i]) PERSONAS[ai].obj[i].y=v; });
  });
  document.querySelectorAll('.pt-text').forEach((el,i)=>{
    _ed(el, v=>{ if(PERSONAS[ai].pts&&PERSONAS[ai].pts[i]!==undefined) PERSONAS[ai].pts[i]=v; });
  });
  document.querySelectorAll('.cc').forEach((el,i)=>{
    _ed(el.querySelector('.ccn'), v=>{ if(PERSONAS[ai].ctry[i]) PERSONAS[ai].ctry[i].n=v; });
    el.querySelectorAll('.cbullets li').forEach((li,j)=>{
      _ed(li, v=>{ if(PERSONAS[ai].ctry[i]&&Array.isArray(PERSONAS[ai].ctry[i].t)) PERSONAS[ai].ctry[i].t[j]=v; });
    });
  });
  // ── STRATEGIC ALIGNMENT TAB ──
  document.querySelectorAll('[data-skey]').forEach(el=>{
    const key=el.dataset.skey;
    _ed(el, v=>{
      const parts=key.split('.');
      if(parts.length===1){ STRATEGIC[key]=v; }
      else if(parts.length===2){ STRATEGIC[parts[0]][parseInt(parts[1])]=v; }
      else if(parts.length===3){ STRATEGIC[parts[0]][parseInt(parts[1])][parts[2]]=v; }
    });
  });
  // ── BD SCENARIOS — SC_JOURNEYS ──
  const stepCard=document.getElementById('sc-step-card');
  if(stepCard&&SC_JOURNEYS[sc_journeyIdx]){
    const jS=SC_JOURNEYS[sc_journeyIdx].steps[sc_stepIdx];
    const _q=stepCard.querySelector('.sc-what'); if(_q) _ed(_q, v=>{ if(jS) jS.title=v; });
    const _d=stepCard.querySelector('.sc-desc'); if(_d) _ed(_d, v=>{ if(jS) jS.desc=v; });
    stepCard.querySelectorAll('.sc-rule-text').forEach((el,i)=>{ _ed(el, v=>{ if(jS&&jS.rules) jS.rules[i]=v; }); });
    stepCard.querySelectorAll('.sc-warn').forEach(el=>{ _ed(el, v=>{ if(jS) jS.warn=v; }); });
    stepCard.querySelectorAll('.sc-good').forEach(el=>{ _ed(el, v=>{ if(jS) jS.good=v; }); });
    stepCard.querySelectorAll('.sc-info').forEach(el=>{ _ed(el, v=>{ if(jS) jS.info=v; }); });
    stepCard.querySelectorAll('.obj-row').forEach((el,i)=>{
      _ed(el.querySelector('.obj-q'), v=>{ if(jS&&jS.objections) jS.objections[i].q=v; });
      _ed(el.querySelector('.obj-a'), v=>{ if(jS&&jS.objections) jS.objections[i].a=v; });
    });
  }
  // ── TEMPLATES TAB ──
  const pi=tplIdx||0;
  document.querySelectorAll('.tpl-name').forEach((el,ti)=>{
    _ed(el, v=>{ if(TEMPLATES[pi]&&TEMPLATES[pi].items[ti]) TEMPLATES[pi].items[ti].name=v; });
  });
  document.querySelectorAll('.tpl-desc').forEach((el,ti)=>{
    _ed(el, v=>{ if(TEMPLATES[pi]&&TEMPLATES[pi].items[ti]) TEMPLATES[pi].items[ti].desc=v; });
  });
}

function deactivateEditMode(){
  document.querySelectorAll('[contenteditable="true"]').forEach(el=>{
    if(el._cb) el.removeEventListener('input',el._cb);
    el.removeAttribute('contenteditable');
  });
}

function showView(view,btn){
  currentView=view;
  document.querySelectorAll('.topnav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['strategic','personas','scenarios','templates'].forEach(v=>{
    document.getElementById('view-'+v).style.display=v===view?'':'none';
  });
  if(view==='strategic')renderStrategic();
  if(view==='personas')renderPersonas();
  if(view==='scenarios')renderScenarios();
  if(view==='templates')renderTemplates();
  if(editMode) setTimeout(activateEditMode,60);
}



// ── HELPER: replace array/object in HTML source ──
function repArr(html, name, val){
  return html.replace(new RegExp('(const '+name+'=)\\[[\\s\\S]*?\\];(\\s*(?:const|let|var|function|//))'),
    function(m,a,b){ return a+JSON.stringify(val)+';'+b; });
}
function repObj(html, name, val){
  return html.replace(new RegExp('(const '+name+'=)\\{[\\s\\S]*?\\};(\\s*(?:const|let|var|function|//))'),
    function(m,a,b){ return a+JSON.stringify(val)+';'+b; });
}

// ── SAVE — DOWNLOAD UPDATED HTML ──
function saveToFile(){ doSave(); }
function saveToSharePoint(){ doSave(); }
function saveToGitHub(){ doSave(); }

function doSave(){
  const btn = document.getElementById('save-btn');
  const origText = btn ? btn.textContent : '↓ Save HTML';
  try {
    let html = _ORIGINAL_SRC;
    if(!html){ const el=document.getElementById('_src'); if(el) _ORIGINAL_SRC=el.value; html=_ORIGINAL_SRC; }
    if(!html){ alert('Source not available. Please reload.'); return; }

    html = repArr(html, 'PERSONAS', PERSONAS);
    html = repArr(html, 'TEMPLATES', TEMPLATES);
    html = repObj(html, 'STRATEGIC', STRATEGIC);

    const escaped = html.replace(/<\/textarea>/g,'<\\/textarea>');
    const newSrc = html.replace(/(<textarea id="_src"[^>]*>)[\s\S]*?(<\/textarea>)/,
      function(m,o,c){ return o+escaped+c; })||html;

    const blob = new Blob([newSrc], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'YouthToPro_BD_Toolkit_v2.html';
    a.click();
    URL.revokeObjectURL(a.href);

    if(btn){ btn.textContent='✓ Downloaded'; btn.style.background='#347969'; }
    const t=document.getElementById('toast');
    if(t){ t.className='toast show'; setTimeout(()=>t.className='toast',2500); }
    setTimeout(()=>{ if(btn){ btn.textContent=origText; btn.style.background=''; }},3000);
  } catch(e){
    alert('Save failed: '+e.message);
    if(btn) btn.textContent=origText;
  }
}


renderStrategic();


</script>
